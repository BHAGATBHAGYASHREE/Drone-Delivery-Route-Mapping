services:
  - type: web
    name: drone-delivery-backend
    runtime: python
    runtimeVersion: 3.11
    buildCommand: pip install -r requirements.txt
    startCommand: python backend/server.py
    envVars:
      - key: PORT
        value: 8000
      - key: PYTHONUNBUFFERED
        value: "1"
    autoDeploy: true

  - type: static
    name: drone-delivery-frontend
    staticPublishPath: frontend
    buildCommand: echo "Static frontend - no build needed"
    autoDeploy: true
    routes:
      - path: /
        index: index.html
